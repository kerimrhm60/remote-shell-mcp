name: install-smoke

# End-to-end smoke test on all three OSes: build the binaries, put them on
# PATH, run `remote-shell-mcp setup`, and verify Claude Code's own CLI
# (`claude mcp list`) sees our server in its config. Then exercise the new
# /rpc surface to confirm the daemon actually answers.
#
# `claude mcp list` only reads the local config, so this works without
# logging into Anthropic in CI.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Cap the whole job — if `claude mcp list` ever decides to prompt for
    # input on a fresh runner, we'd otherwise burn the default 6h.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          go build -o "$HOME/.local/bin/" ./cmd/remote-shell-mcp ./cmd/remote-shell-mcpd
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Register with Claude Code
        shell: bash
        run: remote-shell-mcp setup --yes

      - name: claude mcp list shows remote-shell
        shell: bash
        timeout-minutes: 2
        run: |
          claude mcp list 2>&1 | tee mcp-list.out
          grep -F 'remote-shell' mcp-list.out

      - name: /rpc round trip via the CLI
        # Exercises the new /rpc endpoint: spawns the daemon, hits /rpc with
        # bearer auth, decodes the result. End-to-end check in one line.
        shell: bash
        run: |
          remote-shell-mcp version
          remote-shell-mcp tools | head -3
          remote-shell-mcp status
